<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الآمال | Al-Amal Life Consulting</title>
  <meta name="description" content="الآمال للاستشارات - استشارات أونلاين لتطوير نمط الحياة، تنظيم الأهداف، بناء العادات، وتحسين جودة الحياة اليومية." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" />

  <style>
    :root {
      --bg: #fbf7f1;
      --bg-soft: #fffaf4;
      --white: #ffffff;
      --cream: #f6efe5;
      --gold: #b9894b;
      --gold-dark: #8b6333;
      --rose: #b9827a;
      --rose-dark: #8d5d57;
      --sage: #6f806b;
      --ink: #2e2924;
      --muted: #766d63;
      --line: rgba(46, 41, 36, 0.13);
      --glass: rgba(255, 255, 255, 0.72);
      --glass-strong: rgba(255, 255, 255, 0.86);
      --shadow: 0 24px 70px rgba(88, 60, 40, 0.16);
      --shadow-soft: 0 14px 40px rgba(88, 60, 40, 0.10);
      --shadow-gold: 0 24px 60px rgba(185, 137, 75, 0.20);
      --radius-xl: 38px;
      --max: 1180px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Cairo", sans-serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(185, 137, 75, 0.19), transparent 31%),
        radial-gradient(circle at 91% 13%, rgba(185, 130, 122, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg), var(--bg-soft), var(--bg));
      color: var(--ink);
      overflow-x: hidden;
    }

    body.en {
      direction: ltr;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      width: 100%;
      display: block;
      background: var(--cream);
      color: transparent;
      font-size: 0;
    }

    .container {
      width: min(var(--max), calc(100% - 34px));
      margin: auto;
    }

    .scroll-progress {
      position: fixed;
      top: 0;
      right: 0;
      width: 0%;
      height: 4px;
      z-index: 999;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--rose));
      box-shadow: 0 0 24px rgba(185, 137, 75, 0.5);
      transition: width 0.08s linear;
    }

    .background-orbs {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      filter: blur(45px);
      opacity: 0.24;
      animation: floatOrb 13s ease-in-out infinite;
    }

    .orb.one {
      background: var(--gold);
      top: 7%;
      right: -140px;
    }

    .orb.two {
      background: var(--rose);
      bottom: 15%;
      left: -135px;
      animation-delay: 3s;
    }

    .orb.three {
      background: #aebba8;
      top: 47%;
      right: 35%;
      opacity: 0.16;
      animation-delay: 6s;
    }

    .orb.four {
      background: #fff1d9;
      top: 72%;
      right: 8%;
      opacity: 0.20;
      animation-delay: 8s;
    }

    @keyframes floatOrb {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-24px) scale(1.05);
      }
    }

    .top-note {
      background: linear-gradient(90deg, var(--gold-dark), var(--rose-dark));
      color: var(--white);
      text-align: center;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.1px;
      position: relative;
      overflow: hidden;
    }

    .top-note::after {
      content: "";
      position: absolute;
      top: 0;
      right: -80px;
      width: 70px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: noteShine 4.5s ease-in-out infinite;
    }

    @keyframes noteShine {
      0% {
        transform: translateX(0);
      }
      55%, 100% {
        transform: translateX(-1300px);
      }
    }

    header {
      position: sticky;
      top: 0;
      z-index: 60;
      background: rgba(251, 247, 241, 0.88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      transition: 0.25s ease;
    }

    header.scrolled {
      box-shadow: 0 14px 38px rgba(88, 60, 40, 0.10);
    }

    .nav {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: var(--white);
      background:
        radial-gradient(circle at 35% 25%, #fff0d5, transparent 35%),
        linear-gradient(135deg, var(--gold), var(--rose));
      box-shadow: 0 12px 30px rgba(185, 137, 75, 0.28);
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
    }

    .brand-icon::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.45), transparent);
      transform: translateX(120%);
      animation: iconShine 5s ease-in-out infinite;
    }

    @keyframes iconShine {
      0%, 60% {
        transform: translateX(120%);
      }
      100% {
        transform: translateX(-120%);
      }
    }

    .brand-icon svg {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .brand-text strong {
      display: block;
      font-family: "Amiri", serif;
      font-size: 28px;
      line-height: 1;
      color: var(--ink);
    }

    .brand-text span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .nav-links a {
      transition: 0.25s ease;
      position: relative;
      padding: 8px 0;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 1px;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      transition: 0.25s ease;
      border-radius: 999px;
    }

    body.en .nav-links a::after {
      right: auto;
      left: 0;
    }

    .nav-links a:hover {
      color: var(--gold-dark);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 0;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: 0.25s ease;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: translateX(120%);
      transition: 0.55s ease;
      pointer-events: none;
    }

    .btn:hover::before {
      transform: translateX(-120%);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--white);
      padding: 14px 22px;
      box-shadow: 0 16px 34px rgba(185, 137, 75, 0.30);
    }

    .btn-soft {
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 13px 18px;
      backdrop-filter: blur(14px);
    }

    .btn-outline {
      background: transparent;
      color: var(--gold-dark);
      border: 1px solid rgba(139, 99, 51, 0.25);
      padding: 13px 18px;
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #1f9f64, #16764b);
      color: var(--white);
      padding: 13px 18px;
      box-shadow: 0 14px 30px rgba(31, 159, 100, 0.24);
    }

    .btn-whatsapp:hover {
      box-shadow: 0 18px 38px rgba(31, 159, 100, 0.32);
    }

    .lang-btn {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--gold-dark);
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: 0.25s ease;
    }

    .lang-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-gold);
    }

    .hero {
      padding: 74px 0 62px;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: min(720px, 88vw);
      height: min(720px, 88vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.62), transparent 63%);
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: -1;
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 48px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 16px;
      color: var(--gold-dark);
      font-size: 13px;
      font-weight: 900;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 0 8px rgba(185, 137, 75, 0.14);
      animation: pulseDot 2.2s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% {
        box-shadow: 0 0 0 8px rgba(185, 137, 75, 0.14);
      }
      50% {
        box-shadow: 0 0 0 14px rgba(185, 137, 75, 0.04);
      }
    }

    .amal-word {
      font-family: "Amiri", serif;
      color: var(--gold-dark);
      font-size: clamp(82px, 13vw, 156px);
      line-height: 0.95;
      margin: 23px 0 8px;
      text-shadow: 0 20px 45px rgba(139, 99, 51, 0.16);
      letter-spacing: -2px;
      animation: softGlow 5s ease-in-out infinite;
    }

    body.en .amal-word {
      font-size: clamp(64px, 9vw, 120px);
      letter-spacing: 0;
    }

    @keyframes softGlow {
      0%, 100% {
        filter: drop-shadow(0 12px 22px rgba(185, 137, 75, 0.10));
      }
      50% {
        filter: drop-shadow(0 18px 32px rgba(185, 137, 75, 0.22));
      }
    }

    .amal-tagline {
      font-family: "Amiri", serif;
      color: var(--gold-dark);
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: -8px;
      margin-bottom: 22px;
      opacity: 0.92;
    }

    body.en .amal-tagline {
      font-family: "Cairo", sans-serif;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    h1 {
      font-family: "Amiri", serif;
      font-size: clamp(38px, 5vw, 64px);
      line-height: 1.18;
      margin-bottom: 14px;
    }

    .accent {
      color: var(--gold-dark);
      position: relative;
      display: inline-block;
    }

    .accent::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 5px;
      width: 100%;
      height: 12px;
      background: rgba(185, 137, 75, 0.17);
      z-index: -1;
      border-radius: 999px;
    }

    body.en .accent::after {
      right: auto;
      left: 0;
    }

    .subtitle {
      color: var(--gold-dark);
      font-family: "Amiri", serif;
      font-size: clamp(27px, 4vw, 39px);
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 15px;
      text-shadow: 0 12px 28px rgba(139, 99, 51, 0.13);
    }

    body.en .subtitle {
      font-family: "Cairo", sans-serif;
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 900;
    }

    .lead {
      color: var(--muted);
      line-height: 2;
      font-size: 17px;
      max-width: 670px;
    }

    .hero-actions {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 13px;
    }

    .trust {
      margin-top: 32px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 13px;
      max-width: 690px;
    }

    .trust-card {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      padding: 17px;
      box-shadow: var(--shadow-soft);
      transition: 0.28s ease;
      backdrop-filter: blur(18px);
    }

    .trust-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-gold);
      background: var(--glass-strong);
    }

    .trust-card strong {
      display: block;
      font-size: 19px;
      margin-bottom: 4px;
      color: var(--ink);
    }

    .trust-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    /* مهم: ترتيب الصور والفيديو في الهيرو بدون تكديس */
    .visual {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      grid-template-rows: auto auto;
      grid-template-areas:
        "main small"
        "main card";
      gap: 16px;
      align-items: stretch;
      min-height: 620px;
      perspective: 1100px;
    }

    .visual-main {
      grid-area: main;
      position: relative;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.85);
      background: var(--cream);
      min-height: 620px;
      transform: rotateY(-2deg) rotateX(1deg);
      transition: 0.35s ease;
    }

    body.en .visual-main {
      transform: rotateY(2deg) rotateX(1deg);
    }

    .visual:hover .visual-main {
      transform: rotateY(0deg) rotateX(0deg) translateY(-5px);
    }

    .visual-main video,
    .visual-main img,
    .visual-small video,
    .visual-small img,
    .about-img img,
    .image-card img,
    .image-card video,
    .faq-img img,
    .contact-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .visual-main video,
    .visual-small video {
      display: block;
      opacity: 1;
      background: var(--cream);
    }

    .visual-main::after,
    .visual-small::after,
    .about-img::after,
    .image-card::after,
    .faq-img::after,
    .contact-img::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.20), transparent 38%, rgba(46,41,36,0.10));
      pointer-events: none;
    }

    .visual-small {
      grid-area: small;
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      border: 8px solid rgba(255,255,255,0.70);
      box-shadow: var(--shadow-soft);
      background: var(--cream);
      min-height: 270px;
      animation: floaty 6s ease-in-out infinite;
    }

    .floating {
      grid-area: card;
      position: relative;
      width: 100%;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      animation: floaty 7s ease-in-out infinite;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .floating h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .floating p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
    }

    .mini-line {
      height: 8px;
      background: #efe3d6;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 15px;
    }

    .mini-line span {
      display: block;
      height: 100%;
      width: 74%;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      border-radius: 999px;
      animation: miniMove 4s ease-in-out infinite;
    }

    @keyframes miniMove {
      0%, 100% {
        width: 62%;
      }
      50% {
        width: 84%;
      }
    }

    @keyframes floaty {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    section {
      padding: 84px 0;
      position: relative;
    }

    .section-head {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 42px;
    }

    .kicker {
      color: var(--gold-dark);
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .section-title {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .section-desc {
      color: var(--muted);
      line-height: 2;
      font-size: 16px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .feature {
      min-height: 250px;
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 30px;
      padding: 28px 23px;
      box-shadow: var(--shadow-soft);
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .feature::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      right: -60px;
      bottom: -80px;
      background: rgba(185, 137, 75, 0.10);
      pointer-events: none;
    }

    .feature:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
      background: var(--glass-strong);
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: var(--gold-dark);
      background: linear-gradient(135deg, rgba(185, 137, 75, 0.18), rgba(185, 130, 122, 0.16));
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
      transition: 0.25s ease;
    }

    .feature:hover .icon {
      transform: rotate(-4deg) scale(1.08);
      box-shadow: 0 12px 28px rgba(185, 137, 75, 0.18);
    }

    body.en .feature:hover .icon {
      transform: rotate(4deg) scale(1.08);
    }

    .icon svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .feature h3 {
      font-size: 20px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .feature p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .about {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 42px;
      align-items: center;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 40px;
      padding: 28px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .about::before {
      content: "";
      position: absolute;
      width: 270px;
      height: 270px;
      border-radius: 50%;
      background: rgba(185, 137, 75, 0.10);
      left: -90px;
      top: -90px;
    }

    body.en .about::before {
      left: auto;
      right: -90px;
    }

    .about-img {
      min-height: 520px;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--cream);
      position: relative;
      z-index: 1;
    }

    .about-text {
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .about-text h2 {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .about-text p {
      color: var(--muted);
      line-height: 2.05;
      margin-bottom: 17px;
      font-size: 16px;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 13px;
      margin: 24px 0;
    }

    .chip {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 20px;
      padding: 16px;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 700;
      transition: 0.25s ease;
      backdrop-filter: blur(18px);
    }

    .chip:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-soft);
      background: rgba(255,255,255,0.88);
    }

    .chip strong {
      display: block;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .soft-section {
      background: linear-gradient(180deg, rgba(232, 238, 229, 0.60), rgba(255, 250, 244, 0.70));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      counter-reset: step;
    }

    .step {
      counter-increment: step;
      background: rgba(255, 255, 255, 0.80);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 30px;
      padding: 30px;
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
      transition: 0.28s ease;
      backdrop-filter: blur(18px);
    }

    .step::before {
      content: counter(step, decimal-leading-zero);
      position: absolute;
      top: 10px;
      left: 22px;
      direction: ltr;
      color: rgba(185, 137, 75, 0.15);
      font-size: 52px;
      font-weight: 900;
      pointer-events: none;
    }

    .step:hover {
      transform: translateY(-7px);
      box-shadow: var(--shadow-gold);
    }

    .step h3 {
      font-size: 21px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .step p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .experience-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
    }

    .experience-card {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: var(--radius-xl);
      padding: 34px;
      min-height: 420px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: 0.3s ease;
      position: relative;
      backdrop-filter: blur(18px);
    }

    .experience-card:hover {
      transform: translateY(-7px);
      box-shadow: var(--shadow);
    }

    .experience-card.image-bg {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: white;
      background: var(--cream);
      box-shadow: var(--shadow);
    }

    .experience-card.image-bg .card-bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .experience-card.image-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(46, 41, 36, 0.25);
      z-index: 1;
      pointer-events: none;
    }

    .experience-card.image-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(46,41,36,0.35), transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    .experience-card.image-bg > * {
      position: relative;
      z-index: 2;
    }

    .experience-card h2 {
      font-family: "Amiri", serif;
      font-size: clamp(32px, 4vw, 46px);
      line-height: 1.18;
      margin-bottom: 16px;
    }

    .experience-card p {
      color: var(--muted);
      line-height: 2;
    }

    .experience-card.image-bg p,
    .experience-card.image-bg .small-label {
      color: rgba(255, 255, 255, 0.88);
    }

    .small-label {
      color: var(--gold-dark);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .soft-list {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .soft-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px;
      border-radius: 17px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      font-weight: 800;
      transition: 0.25s ease;
    }

    .soft-item:hover {
      transform: translateX(-6px);
      background: rgba(255,255,255,0.88);
    }

    body.en .soft-item:hover {
      transform: translateX(6px);
    }

    .soft-check {
      width: 27px;
      height: 27px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--gold-dark);
      background: rgba(185, 137, 75, 0.15);
      flex: 0 0 auto;
    }

    .soft-check svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .image-strip {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 1fr;
      gap: 16px;
      height: 520px;
    }

    .image-stack {
      display: grid;
      gap: 16px;
    }

    .image-card {
      border-radius: 32px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      background: var(--cream);
      position: relative;
      transition: 0.35s ease;
    }

    .image-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
    }

    .image-card img,
    .image-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.6s ease;
    }

    .image-card:hover img,
    .image-card:hover video {
      transform: scale(1.06);
    }

    .quote {
      background:
        linear-gradient(135deg, rgba(185, 137, 75, 0.90), rgba(141, 93, 87, 0.86)),
        url("Images/amal-abstract.png") center/cover;
      color: white;
      border-radius: 40px;
      padding: clamp(34px, 6vw, 68px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .quote::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      left: -90px;
      top: -90px;
      animation: quoteOrb 8s ease-in-out infinite;
    }

    @keyframes quoteOrb {
      0%, 100% {
        transform: translate(0,0);
      }
      50% {
        transform: translate(25px,20px);
      }
    }

    .quote h2,
    .quote p {
      position: relative;
      z-index: 1;
    }

    .quote h2 {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 60px);
      line-height: 1.25;
      max-width: 880px;
      margin-bottom: 16px;
    }

    .quote p {
      max-width: 760px;
      color: rgba(255, 255, 255, 0.88);
      line-height: 2;
    }

    .packages {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .package {
      padding: 30px;
      border-radius: 31px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow-soft);
      transition: 0.28s;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .package::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(185,137,75,0.16), transparent 45%, rgba(185,130,122,0.12));
      opacity: 0;
      transition: 0.3s ease;
      pointer-events: none;
    }

    .package.highlight {
      transform: translateY(-10px);
      border-color: rgba(185, 137, 75, 0.34);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,248,239,0.84));
      box-shadow: var(--shadow);
    }

    .package:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
    }

    .package:hover::before {
      opacity: 1;
    }

    .package.highlight:hover {
      transform: translateY(-14px);
    }

    .package h3,
    .package p,
    .package .price,
    .package ul,
    .package .btn {
      position: relative;
      z-index: 1;
    }

    .package h3 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .package p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .price {
      color: var(--gold-dark);
      font-weight: 900;
      font-size: 30px;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .package ul {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .package li {
      display: flex;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.7;
    }

    .package li svg {
      width: 18px;
      height: 18px;
      color: var(--gold-dark);
      flex: 0 0 auto;
      margin-top: 5px;
    }

    .faq {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 28px;
      align-items: start;
    }

    .faq-img {
      height: 525px;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: sticky;
      top: 105px;
      background: var(--cream);
    }

    .faq-list {
      display: grid;
      gap: 14px;
    }

    details {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 24px;
      padding: 18px 20px;
      box-shadow: var(--shadow-soft);
      transition: 0.25s ease;
      backdrop-filter: blur(18px);
    }

    details:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-gold);
    }

    summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-weight: 900;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary span {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(185, 137, 75, 0.14);
      color: var(--gold-dark);
      flex: 0 0 auto;
      transition: 0.25s;
    }

    details[open] summary span {
      transform: rotate(45deg);
    }

    details p {
      padding-top: 13px;
      color: var(--muted);
      line-height: 2;
      font-size: 14px;
    }

    .contact-box {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 30px;
      align-items: center;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 40px;
      padding: clamp(28px, 5vw, 56px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .contact-box::before {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: rgba(185, 137, 75, 0.10);
      right: -140px;
      bottom: -140px;
    }

    body.en .contact-box::before {
      right: auto;
      left: -140px;
    }

    .contact-box > * {
      position: relative;
      z-index: 1;
    }

    .contact-box h2 {
      font-family: "Amiri", serif;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.16;
      margin-bottom: 15px;
    }

    .contact-box p {
      color: var(--muted);
      line-height: 2;
      margin-bottom: 24px;
    }

    .contact-img {
      min-height: 400px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      background: var(--cream);
      position: relative;
    }

    .legal {
      margin-top: 22px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 20px;
      padding: 16px;
      color: var(--muted);
      line-height: 1.9;
      font-size: 13px;
      backdrop-filter: blur(18px);
    }

    footer {
      background: #2f2923;
      color: rgba(255, 255, 255, 0.82);
      padding: 46px 0 28px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 24px;
      margin-bottom: 28px;
    }

    footer h3 {
      font-family: "Amiri", serif;
      color: white;
      font-size: 29px;
      margin-bottom: 12px;
    }

    footer p,
    footer a {
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.9;
      font-size: 14px;
    }

    .footer-links {
      display: grid;
      gap: 8px;
    }

    .footer-links a {
      transition: 0.25s ease;
    }

    .footer-links a:hover {
      color: white;
      transform: translateX(-4px);
    }

    body.en .footer-links a:hover {
      transform: translateX(4px);
    }

    .footer-bottom {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding-top: 22px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      color: rgba(255, 255, 255, 0.55);
      font-size: 13px;
    }

    .floating-wa-wrap {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    body.en .floating-wa-wrap {
      left: auto;
      right: 18px;
      flex-direction: row-reverse;
    }

    .floating-wa-label {
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
      white-space: nowrap;
      transition: 0.25s ease;
    }

    .floating-wa-label:hover {
      transform: translateY(-3px);
      color: var(--gold-dark);
    }

    .floating-wa {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1f9f64, #16764b);
      color: white;
      display: grid;
      place-items: center;
      box-shadow: 0 18px 40px rgba(31, 159, 100, 0.32);
      transition: 0.25s ease;
      animation: whatsappPulse 2.4s ease-in-out infinite;
      flex: 0 0 auto;
    }

    @keyframes whatsappPulse {
      0%, 100% {
        box-shadow: 0 18px 40px rgba(31, 159, 100, 0.32), 0 0 0 0 rgba(31,159,100,0.22);
      }
      50% {
        box-shadow: 0 18px 40px rgba(31, 159, 100, 0.32), 0 0 0 12px rgba(31,159,100,0);
      }
    }

    .floating-wa:hover {
      transform: translateY(-4px) scale(1.04);
    }

    .floating-wa svg {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
    }

    .icon-flip {
      transition: transform 0.2s ease;
    }

    html[dir="rtl"] .icon-flip {
      transform: scaleX(-1);
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .delay-1 {
      transition-delay: 0.12s;
    }

    .delay-2 {
      transition-delay: 0.24s;
    }

    .delay-3 {
      transition-delay: 0.36s;
    }

    .tilt-card {
      transform-style: preserve-3d;
    }

    @media (max-width: 1020px) {
      .nav-links {
        display: none;
      }

      .hero-grid,
      .about,
      .experience-grid,
      .faq,
      .contact-box {
        grid-template-columns: 1fr;
      }

      .features,
      .packages {
        grid-template-columns: repeat(2, 1fr);
      }

      .steps {
        grid-template-columns: 1fr;
      }

      .visual {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "main main"
          "small card";
        min-height: auto;
      }

      .visual-main {
        min-height: 520px;
      }

      .visual-small {
        min-height: 260px;
      }

      .faq-img {
        position: relative;
        top: auto;
        height: 365px;
      }

      .image-strip {
        height: auto;
        grid-template-columns: 1fr;
      }

      .image-card {
        min-height: 290px;
      }

      .image-stack {
        grid-template-columns: 1fr 1fr;
      }

      .footer-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .container {
        width: min(100% - 28px, var(--max));
      }

      .top-note {
        font-size: 12px;
        line-height: 1.6;
      }

      .nav {
        min-height: 70px;
      }

      .brand-icon {
        width: 44px;
        height: 44px;
        border-radius: 17px;
      }

      .brand-text strong {
        font-size: 23px;
      }

      .brand-text span {
        font-size: 10px;
      }

      .nav-actions .btn-primary {
        display: none;
      }

      .nav-actions .btn-soft {
        padding: 10px 14px;
        font-size: 13px;
        border-radius: 999px;
      }

      .header-wa {
        width: 43px;
        height: 43px;
        padding: 0;
      }

      .header-wa span {
        display: none;
      }

      .lang-btn {
        width: 43px;
        height: 43px;
      }

      .hero {
        padding: 48px 0 42px;
      }

      .hero-grid {
        gap: 34px;
      }

      .amal-word {
        font-size: 96px;
        margin-top: 20px;
      }

      body.en .amal-word {
        font-size: 62px;
      }

      h1 {
        font-size: 40px;
      }

      .subtitle {
        font-size: 29px;
      }

      .lead {
        font-size: 15px;
      }

      .hero-actions {
        flex-direction: column;
      }

      .hero-actions .btn {
        width: 100%;
      }

      .trust,
      .features,
      .chips,
      .packages {
        grid-template-columns: 1fr;
      }

      /* الأهم: على الموبايل كل عنصر يصبح مستقل ولا يحجب الثاني */
      .visual {
        grid-template-columns: 1fr;
        grid-template-areas:
          "main"
          "small"
          "card";
        gap: 16px;
        min-height: auto;
      }

      .visual-main,
      body.en .visual-main {
        min-height: 430px;
        height: 430px;
        transform: none;
        border-radius: 34px;
      }

      .visual-small {
        min-height: 220px;
        height: 220px;
        width: 100%;
        border: 6px solid rgba(255,255,255,0.72);
        border-radius: 28px;
      }

      .floating {
        width: 100%;
        border-radius: 28px;
      }

      section {
        padding: 62px 0;
      }

      .about {
        padding: 18px;
        border-radius: 30px;
      }

      .about-img {
        min-height: 360px;
      }

      .about-text {
        padding: 8px;
      }

      .experience-card {
        min-height: auto;
        padding: 26px;
      }

      .image-stack {
        grid-template-columns: 1fr;
      }

      .package.highlight {
        transform: none;
      }

      .contact-box {
        padding: 18px;
        border-radius: 30px;
      }

      .contact-img {
        min-height: 300px;
      }

      .footer-bottom {
        display: grid;
      }

      .floating-wa-wrap {
        left: 14px;
        bottom: 14px;
        gap: 8px;
      }

      body.en .floating-wa-wrap {
        right: 14px;
        left: auto;
      }

      .floating-wa-label {
        font-size: 12px;
        padding: 10px 13px;
      }

      .floating-wa {
        width: 54px;
        height: 54px;
      }
    }

    @media (max-width: 420px) {
      .floating-wa-label {
        max-width: 175px;
        white-space: normal;
        line-height: 1.4;
        border-radius: 18px;
      }

      .brand-text span {
        max-width: 135px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn-soft:not(.header-wa) {
        display: none;
      }

      .visual-main {
        height: 400px;
        min-height: 400px;
      }
    }

    /* Desktop hero card fix only */
    @media (min-width: 1021px) {
      .visual {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        grid-template-areas:
          "main"
          "small"
          "card";
        gap: 16px;
        min-height: auto;
      }

      .visual-main {
        min-height: auto;
        height: auto;
        aspect-ratio: 16 / 9;
        border-radius: 40px;
      }

      .visual-main video,
      .visual-main img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .visual-small {
        min-height: 260px;
        height: 260px;
      }

      .floating {
        min-height: 190px;
      }
    }


    /* Mobile hero card correct dimensions only */
    @media (max-width: 680px) {
      .visual {
        grid-template-columns: 1fr;
        grid-template-areas:
          "main"
          "small"
          "card";
        gap: 16px;
        min-height: auto;
      }

      .visual-main,
      body.en .visual-main {
        width: 100%;
        height: auto;
        min-height: auto;
        aspect-ratio: 16 / 9;
        border-radius: 34px;
        transform: none;
      }

      .visual-main video,
      .visual-main img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .visual-small {
        width: 100%;
        height: auto;
        min-height: auto;
        aspect-ratio: 16 / 9;
        border: 6px solid rgba(255,255,255,0.72);
        border-radius: 28px;
      }

      .visual-small video,
      .visual-small img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    }

  </style>
</head>

<body>
  <div class="scroll-progress" id="scrollProgress"></div>

  <div class="background-orbs">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
    <div class="orb four"></div>
  </div>

  <div class="top-note" data-i18n="top"></div>

  <header id="siteHeader">

    function updateScrollEffects() {

      });
    });

    const revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          revealObserver.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.12
    });

    document.querySelectorAll(".reveal").forEach(function(element) {
      revealObserver.observe(element);
    });

    document.querySelectorAll(".tilt-card").forEach(function(card) {
      card.addEventListener("mousemove", function(event) {
        if (window.innerWidth <= 768) {
          return;
        }

        const rect = card.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -3;
        const rotateY = ((x - centerX) / centerX) * 3;

        card.style.transform = "translateY(-6px) rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg)";
      });

      card.addEventListener("mouseleave", function() {
        card.style.transform = "";
      });
    });
